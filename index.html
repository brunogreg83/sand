<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indústrias Representadas</title>
<style>
#industrias-representadas{
    background:#ffffff !important;
    background-image:none !important;
    padding:80px 20px;
    position:relative;
    z-index:1;
    font-family: Arial, sans-serif;
}
#industrias-representadas::before,
#industrias-representadas::after{
    display:none !important;
}
.container{
    max-width:1200px;
    margin:auto;
}
.titulo-industria{
    text-align:center;
}
.titulo-industria span{
    color:#264f8f;
    letter-spacing:3px;
}
.titulo-industria h2{
    color:#0b1f4d;
    font-size:48px;
}
.parceiro p{
    color:#5f6f86;
    text-align:center;
    line-height:1.8;
    max-width:900px;
    margin:30px auto;
}
</style>
</head>
<body>
<section id="industrias-representadas">
    <div class="container">
        <div class="titulo-industria">
            <span>— INDÚSTRIAS REPRESENTADAS</span>
            <h2>Nossos Parceiros Industriais</h2>
        </div>

        <div class="parceiro">
            <!-- Substitua pelas URLs/imagens reais -->
            <p>
                A Atuante Química é referência no desenvolvimento de soluções
                para limpeza profissional e industrial, oferecendo produtos de
                alta performance voltados para empresas, indústrias,
                condomínios e instituições.
            </p>
        </div>
    </div>
</section>
</body>
</html>
